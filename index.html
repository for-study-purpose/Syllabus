<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Library</title>

<style>

body{
    font-family: Segoe UI, Arial, sans-serif;
    background:#0f172a;
    margin:0;
    padding:40px;
    color:#e2e8f0;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.nav{
    text-align:center;
    margin-bottom:30px;
}

.nav button{
    background:#3b82f6;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    color:white;
    cursor:pointer;
    font-weight:500;
}

.nav button:hover{
    background:#2563eb;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #334155;
}

.card h3{
    margin-top:0;
}

input{
    padding:6px;
    width:80px;
    border-radius:5px;
    border:1px solid #475569;
    background:#0f172a;
    color:white;
}

button.open{
    padding:7px 14px;
    border:none;
    background:#3b82f6;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button.open:hover{
    background:#2563eb;
}

</style>

</head>

<body>

<h1>📚 PDF Resources</h1>

<div class="nav">
<button onclick="window.location.href='pyqs.html'">📄 PYQs</button>
</div>

<div class="container">

<div class="card">
<h3>1st Year Syllabus</h3>
<input type="number" id="p1" placeholder="Page">
<button class="open" onclick="openPDF('syllabus1.pdf','p1')">Open</button>
</div>

<div class="card">
<h3>2nd Year E&TC Syllabus</h3>
<input type="number" id="p2" placeholder="Page">
<button class="open" onclick="openPDF('syllabus2.pdf','p2')">Open</button>
</div>
    
<div class="card">
<h3>3rd Year E&TC Syllabus</h3>
<input type="number" id="p3" placeholder="Page">
<button class="open" onclick="openPDF('syllabus3.pdf','p3')">Open</button>
</div>
    
<div class="card">
<h3>4th Year E&TC Syllabus</h3>
<input type="number" id="p4" placeholder="Page">
<button class="open" onclick="openPDF('syllabus4.pdf','p4')">Open</button>
</div>

<div class="card">
<h3>AIML Honors Syllabus</h3>
<input type="number" id="p5" placeholder="Page">
<button class="open" onclick="openPDF('aiml.pdf','p5')">Open</button>
</div>

</div>

<script>

function openPDF(file,id){

let page = document.getElementById(id).value;

if(page){
    window.open(file + "#page=" + page, "_blank");
}
else{
    window.open(file, "_blank");
}

}

</script>

</body>
</html>
