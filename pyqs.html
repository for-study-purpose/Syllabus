<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PYQs</title>

<style>

body{
    font-family: Segoe UI, Arial, sans-serif;
    background:#0f172a;
    margin:0;
    padding:40px;
    color:#e2e8f0;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.top{
    text-align:center;
    margin-bottom:30px;
}

.top button{
    background:#3b82f6;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.top button:hover{
    background:#2563eb;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:#1e293b;
    padding:20px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #334155;
}

.card h3{
    margin-top:0;
}

input{
    padding:6px;
    width:80px;
    border-radius:5px;
    border:1px solid #475569;
    background:#0f172a;
    color:white;
}

button.open{
    padding:7px 14px;
    border:none;
    background:#3b82f6;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button.open:hover{
    background:#2563eb;
}

</style>

</head>

<body>

<h1>📄 Previous Year Questions</h1>

<div class="top">
<button onclick="window.location.href='index.html'">⬅ Back</button>
</div>

<div class="container">

<div class="card">
<h3>CN Insem March 23</h3>
<input type="number" id="pyq1" placeholder="Page">
<button class="open" onclick="openPDF('cellularnetworks/insem/CN-March23.pdf','pyq1')">Open</button>
</div>

<div class="card">
<h3>CN Insem March 24</h3>
<input type="number" id="pyq2" placeholder="Page">
<button class="open" onclick="openPDF('cellularnetworks/insem/CN-March24.pdf','pyq2')">Open</button>
</div>

<div class="card">
<h3>PDC Insem March 23</h3>
<input type="number" id="pyq3" placeholder="Page">
<button class="open" onclick="openPDF('pdc/insem/PDC-March-23.pdf','pyq3')">Open</button>
</div>

<div class="card">
<h3>PDC Insem March 24</h3>
<input type="number" id="pyq4" placeholder="Page">
<button class="open" onclick="openPDF('pdc/insem/PDC-March-24.pdf','pyq4')">Open</button>
</div>

</div>

<script>

function openPDF(file,id){

let page = document.getElementById(id).value;

if(page){
    window.open(file + "#page=" + page, "_blank");
}
else{
    window.open(file, "_blank");
}

}

</script>

</body>
</html>
